services:
  - type: worker
    name: bot-inmobiliario
    env: python
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "python main.py"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
